<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #main {
            width: 100%;
            height: 100%;
            background: #000;
        }

        .box {
            width: 100px;
            height: 100px;
            background: greenyellow;
        }
    </style>
</head>

<body>

    <div id="main">
        <div class="box"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>

        gsap.from(".box", {
            y: 80,
            opacity: 0,
            duration: 3,
            ease: "power3.out"
        });

    </script>
</body>

</html>
