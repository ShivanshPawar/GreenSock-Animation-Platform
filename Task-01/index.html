<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card-Animation Task</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #main {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }

        .card1,
        .card2,
        .card3 {
            width: 150px;
            height: 200px;
            border-radius: 5px;
            overflow: hidden;
        }

        img {
            width: 100%;
            height: 100%;
        }
    </style>

</head>

<body>

    <div id="main">
        <div class="card1"><img src="./1.png" alt=""></div>
        <div class="card2"><img src="./2.png" alt=""></div>
        <div class="card3"><img src="./3.png" alt=""></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <script>

        gsap.from(".card1", {
            y: 50,
            opacity: 0,
            duration: 1,
            ease: "back.out(1.7)",
            delay: 1
        })

        gsap.from(".card2", {
            y: 50,
            opacity: 0,
            duration: 1,
            ease: "back.out(1.7)",
            delay: 1.5
        })

        gsap.from(".card3", {
            y: 50,
            opacity: 0,
            duration: 1,
            ease: "back.out(1.7)",
            delay: 2
        })

    </script>

</body>

</html>
